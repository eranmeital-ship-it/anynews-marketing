<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style id="ag-hide">html{visibility:hidden}</style>
<script type="module" src="../assets/app-guard.js"></script>
<script type="module" src="../assets/channel-context.js"></script>
<title>Signal Room — Gold &amp; Silver News — AnyNews.ai</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../assets/style.css" />
<style>
  .signal-row {
    display: grid;
    grid-template-columns: 56px 32px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .signal-row:last-child { border-bottom: 0; }
  .signal-row:hover { background: var(--surface-hover); }
  .signal-score {
    font-family: ui-monospace, SF Mono, monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--purple-50);
    color: var(--purple-900);
    text-align: center;
  }
  .signal-score.med { background: var(--surface-hover); color: var(--text-secondary); }
  .signal-score.low { background: var(--surface-hover); color: var(--text-tertiary); }
  .signal-source {
    width: 32px; height: 32px;
    border-radius: 8px;
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .signal-actions { display: flex; gap: 6px; align-items: center; }
  .signal-action-btn {
    padding: 8px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
  }
  .signal-action-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .signal-action-btn.more:hover { border-color: var(--success); color: var(--success); background: var(--success-soft); }
  .signal-action-btn.less:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }
  .signal-action-btn.remove:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }
  /* Sticky active states for Good/Bad rating buttons. */
  .signal-action-btn.more.is-active {
    border-color: var(--success);
    color: var(--success);
    background: var(--success-soft);
  }
  .signal-action-btn.less.is-active {
    border-color: var(--danger);
    color: var(--danger);
    background: var(--danger-soft);
  }
  .signal-action-btn.note { width: 28px; height: 28px; padding: 4px; font-size: 13px; }
  .signal-action-btn.note.has-note { color: var(--purple-700); border-color: var(--purple-300); background: var(--purple-50); }
  .entry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) {
    .entry-grid { grid-template-columns: 1fr; }
  }
  .url-add, .manual-add {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 16px 18px;
    background: var(--brand-grad-soft);
    border: 1px solid var(--purple-100);
    border-radius: 14px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.12s, transform 0.12s;
  }
  .manual-add:hover {
    border-color: var(--purple-500);
    transform: translateY(-1px);
  }
  .url-add .icon-wrap, .manual-add .icon-wrap {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--brand-grad);
    color: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  /* Signal row: thumbnail + status badge */
  .signal-thumb {
    width: 64px; height: 48px;
    border-radius: 8px;
    background: var(--surface-hover) center/cover no-repeat;
    flex-shrink: 0;
  }
  .signal-row.with-thumb {
    grid-template-columns: 56px 32px 64px 1fr auto;
  }
  .sig-badge {
    display: inline-flex; align-items: center;
    padding: 2px 7px; border-radius: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .sig-badge.new { background: var(--purple-50); color: var(--purple-700); }
  .sig-badge.kept { background: #DCFCE7; color: #16A34A; }
  .sig-badge.used { background: var(--surface-hover); color: var(--text-secondary); }
  .sig-badge.archived { background: #FEE2E2; color: #B91C1C; }

  /* Category chip (from LLM scorer) */
  .cat-chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; background:var(--surface-hover); color:var(--text-secondary); }

  /* Channel-level health badges (header). Same visual pattern as the
     per-source health badges on channel-sources.html. */
  .src-health-row{display:flex;gap:14px;flex-wrap:wrap}
  .src-health{display:inline-flex;align-items:baseline;gap:4px;font-size:11px}
  .src-health-label{color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .src-health-val{color:var(--text-secondary);font-weight:600;font-variant-numeric:tabular-nums}
  .src-health-val.muted{color:var(--text-tertiary);font-weight:500;font-style:italic}

  /* Live age pill — recomputed every minute from data-ts. Tier classes
     color-code by age, applied to both the pill and a subtle left border
     accent on the row. Kept in-pattern with existing badge sizing. */
  .signal-age {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    background: var(--surface-hover); color: var(--text-secondary);
  }
  .signal-age.tier-fresh { background: #DCFCE7; color: #15803D; }
  .signal-age.tier-warm  { background: #FEF3C7; color: #B45309; }
  .signal-age.tier-stale { background: #FEE2E2; color: #B91C1C; }
  .signal-age.tier-old   { background: var(--surface-hover); color: var(--text-tertiary); }
  .signal-age.tier-fallback { /* same colors as the tier classes, but italic */
    font-style: italic;
  }
  /* Subtle 3px left accent on the row by tier (in addition to the pill) */
  .signal-row { border-left: 3px solid transparent; }
  .signal-row.tier-fresh { border-left-color: #22C55E; }
  .signal-row.tier-warm  { border-left-color: #F59E0B; }
  .signal-row.tier-stale { border-left-color: #EF4444; }
  .signal-row.tier-old   { border-left-color: transparent; }

  /* Score colors — green ≥70, amber 30-69, red <30, muted when null */
  .signal-score.score-high { background: #DCFCE7; color: #15803D; }
  .signal-score.score-mid  { background: #FEF3C7; color: #B45309; }
  .signal-score.score-low  { background: #FEE2E2; color: #B91C1C; }
  .signal-score.score-none { background: var(--surface-hover); color: var(--text-tertiary); }

  /* Category filter strip */
  .cat-filter { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .cat-filter button {
    padding:5px 11px; border-radius:999px; border:1px solid var(--border);
    background:#fff; cursor:pointer; font-size:12px; font-weight:600;
    color: var(--text-secondary);
    transition: all .12s;
  }
  .cat-filter button:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .cat-filter button.active { background: var(--purple-700); border-color: var(--purple-700); color:#fff; }

  /* Time-bucket tabs row: tabs (left), spacer, sort dropdown, channel
     health pill (right). The row carries the border-bottom now that the
     tabs are no longer the full-width element. */
  .time-tabs-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .time-tabs-row .time-tabs-spacer { flex: 1; }
  /* Health + sort controls sit on the right; give them a bit of bottom
     padding so they don't kiss the border-bottom line. */
  .time-tabs-row .sort-by-wrap,
  .time-tabs-row .channel-health-pill { margin-bottom: 8px; }

  /* Time-bucket tabs — segmented underlined tabs above the list */
  .time-tabs {
    display: flex;
    gap: 4px;
  }
  .time-tabs button {
    padding: 10px 14px;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    transition: color .12s, border-color .12s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: -1px;
  }
  .time-tabs button:hover:not(.active) { color: var(--text-primary); }
  .time-tabs button.active {
    color: var(--purple-700);
    border-bottom-color: var(--purple-700);
  }
  .time-tabs .count {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-tertiary);
    background: var(--surface-hover);
    padding: 2px 8px;
    border-radius: 999px;
    min-width: 18px;
    text-align: center;
  }
  .time-tabs button.active .count { background: var(--purple-50); color: var(--purple-700); }

  /* Sort dropdown — sits on the right of the tab row */
  .sort-by-wrap {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px;
  }
  .sort-by-label {
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  .sort-by-select {
    padding: 4px 8px;
    font-size: 12px;
    height: auto;
    min-width: 160px;
  }

  /* Channel-health pill in the tab row — fixed lime accent so the user
     sees at a glance that the channel IS being polled. Uses the same
     tokens as the .signal-age.tier-fresh pill (#DCFCE7 / #15803D). */
  .channel-health-pill {
    background: #DCFCE7;
    color: #15803D;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.2;
    gap: 10px;
    flex-wrap: nowrap;
  }
  .channel-health-pill .src-health-label { color: #15803D; }
  .channel-health-pill .src-health-val   { color: #15803D; font-weight: 700; }
  .channel-health-pill .src-health-val.muted { color: #15803D; opacity: 0.7; font-style: italic; }

  /* Archive cleanup footer */
  .cleanup-foot {
    display: flex; gap: 12px; align-items: center; justify-content: center;
    padding: 18px; margin-top: 14px;
    border: 1px dashed var(--border); border-radius: 12px;
    font-size: 13px; color: var(--text-secondary);
  }
  .cleanup-foot button { white-space: nowrap; }

  /* Edit signal modal (self-contained — these classes don't live in style.css) */
  .es-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; pointer-events:none; transition: opacity .18s; }
  .es-overlay.open { opacity:1; pointer-events:all; }
  .es-modal { background:#fff; border-radius:16px; width:640px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,.18); }
  .es-head { padding:22px 26px 0; }
  .es-body { padding:18px 26px; }
  .es-foot { padding:0 26px 22px; display:flex; gap:10px; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:16px; margin-top:4px; }
</style>
</head>
<body>

<div class="app-shell">
  <div data-include="sidebar-channel" data-active="signal-room" data-channel-name="Gold &amp; Silver News"></div>

  <main class="app-main">
    <div class="app-header">
      <div>
        <p class="label-up">Channel · Gold &amp; Silver News</p>
        <h1 class="h1 mt-1">Signal Room <span class="help" data-help="Where every new story lands. AnyNews fetches signals from your sources, scores them 0-10 for relevance, and lists the 10 latest here. From here you generate posts or train the scorer with More/Less buttons."></span></h1>
        <p class="body muted mt-1">Signals captured for this channel.</p>
      </div>
      <div class="flex gap-2" style="align-items:flex-start">
        <p class="tertiary" id="fetch-status" style="font-size:12px;margin:8px 4px 0;display:none"></p>
        <p class="tertiary" id="score-status" style="font-size:12px;margin:8px 4px 0;display:none"></p>
        <button class="btn btn-secondary" id="score-now" title="Run Claude scoring on unscored signals">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Score signals
        </button>
        <button class="btn btn-primary" id="fetch-now">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><polyline points="21 3 21 8 16 8"/></svg>
          Fetch now
        </button>
      </div>
    </div>

    <!-- Two entry points: paste a URL, or write from scratch -->
    <div class="entry-grid">
      <div class="url-add">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <div style="flex: 1; min-width: 0;">
          <p class="body" style="font-weight: 600; font-size: 14px; margin: 0;">Add from URL <span class="help" data-help="Paste any article URL here and we'll fetch the title, summary, and image. Useful when you spot a story before our scrapers do, or when the source isn't in your feed list."></span></p>
          <div class="flex gap-2 mt-2">
            <input class="input" id="adhoc-url" placeholder="https://reuters.com/markets/..." style="flex: 1; min-width: 0;" />
            <button class="btn btn-primary btn-sm" id="adhoc-fetch">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
              Fetch
            </button>
          </div>
          <p id="adhoc-status" class="tertiary mt-2" style="font-size:12px;display:none"></p>
        </div>
      </div>

      <a href="post-editor.html?manual=1" class="manual-add">
        <div class="icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </div>
        <div style="flex: 1; min-width: 0;">
          <p class="body" style="font-weight: 600; font-size: 14px; margin: 0;">Write from scratch <span class="help" data-help="Skip the signal step entirely. Open an empty post editor and write your own headline and body. Useful for announcements, original takes, or stories that have no public URL yet."></span></p>
          <p class="tertiary mt-2" style="font-size: 12px;">Open an empty post editor and write your own.</p>
        </div>
        <button class="btn btn-primary btn-sm" style="align-self: center;">
          New post
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </a>
    </div>

    <!-- Time-bucket tabs (left) + right-aligned channel health + sort control.
         The time-tabs <div> keeps its id so existing wiring is unchanged;
         it's just wrapped now. Health + sort sit together on the right
         side of the same row. -->
    <div class="time-tabs-row">
      <div class="time-tabs" id="time-tabs" style="display:none"></div>
      <div class="time-tabs-spacer"></div>
      <label class="sort-by-wrap" title="Reorder within the active time bucket">
        <span class="sort-by-label">Sort by</span>
        <select class="select sort-by-select" id="sort-by">
          <option value="lastAdded">Last added</option>
          <option value="score">Relevance score</option>
          <option value="source">Source</option>
          <option value="date">Published date</option>
        </select>
      </label>
      <!-- Channel-level health (relocated from page header). Lime fixed
           accent — uses the existing fresh-tier color tokens from the
           signal-age pills. paintChannelHealth() still populates this. -->
      <div id="channel-health" class="src-health-row channel-health-pill"></div>
    </div>

    <!-- Category filter strip -->
    <div class="cat-filter" id="cat-filter" style="display:none"></div>

    <!-- Signal rows (dynamic) -->
    <div class="card" style="padding:0" id="sig-card">
      <div id="sig-list">
        <div style="padding:48px 32px;text-align:center">
          <p class="tertiary" style="font-size:13px;margin:0">Loading signals…</p>
        </div>
      </div>
    </div>
  
    <!-- EDIT SIGNAL MODAL -->
    <div class="es-overlay" id="es-overlay">
      <div class="es-modal">
        <div class="es-head">
          <p style="font-size:18px;font-weight:700;margin:0 0 4px">Edit signal</p>
          <p style="font-size:13px;color:var(--text-secondary);margin:0" id="es-source-line"></p>
        </div>
        <div class="es-body">
          <!-- Image thumb (read-only) + meta strip -->
          <div id="es-image-row" style="display:none;align-items:flex-start;gap:14px;margin-bottom:14px">
            <div id="es-image" style="width:120px;height:90px;border-radius:8px;background-size:cover;background-position:center;background-color:var(--surface-hover);flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <p id="es-meta-dates" class="tertiary" style="margin:0 0 4px;font-size:12px"></p>
              <p style="margin:0;font-size:12px">
                <span id="es-meta-category" class="cat-chip" style="display:none"></span>
                <a id="es-meta-url" href="#" target="_blank" rel="noopener" style="display:none;margin-left:6px;color:var(--purple-700);font-weight:600;word-break:break-all">Open article ↗</a>
              </p>
            </div>
          </div>
          <!-- Meta strip when there's no image — keeps the same fields visible -->
          <div id="es-meta-noimg" style="display:none;margin-bottom:14px;padding:10px 12px;background:var(--surface-hover);border-radius:8px">
            <p id="es-meta-dates-noimg" class="tertiary" style="margin:0 0 4px;font-size:12px"></p>
            <p style="margin:0;font-size:12px">
              <span id="es-meta-category-noimg" class="cat-chip" style="display:none"></span>
              <a id="es-meta-url-noimg" href="#" target="_blank" rel="noopener" style="display:none;margin-left:6px;color:var(--purple-700);font-weight:600;word-break:break-all">Open article ↗</a>
            </p>
          </div>

          <div class="field-group" style="margin-bottom:14px">
            <label class="field-label" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);display:block;margin-bottom:6px">Title</label>
            <input type="text" class="input" id="es-title" />
          </div>
          <div class="field-group" style="margin-bottom:14px">
            <label class="field-label" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);display:block;margin-bottom:6px">Article content</label>
            <textarea class="textarea" id="es-content" rows="10" placeholder="No article body extracted. (Some sites don't expose the article text in a way the fetcher can read.)"></textarea>
          </div>
          <div class="field-group" style="margin-bottom:6px">
            <label class="field-label" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);display:block;margin-bottom:6px">Status</label>
            <select class="select" id="es-status">
              <option value="new">New</option>
              <option value="kept">Kept</option>
              <option value="used">Used</option>
              <option value="archived">Archived</option>
            </select>
          </div>
          <div id="es-error" class="field-hint" style="display:none;color:#b91c1c;margin-top:8px"></div>
        </div>
        <div class="es-foot">
          <button class="btn btn-ghost" id="es-delete" style="color:#b91c1c">Delete signal</button>
          <div class="flex gap-2">
            <button class="btn btn-secondary" id="es-cancel">Cancel</button>
            <button class="btn btn-primary" id="es-save">Save</button>
          </div>
        </div>
      </div>
    </div>
</main>
</div>

<script src="../assets/partials.js"></script>
<script type="module">
  import { listSignals, updateSignal, deleteSignal, fetchSignalsNow, fetchSignalFromUrl, scoreSignalsNow, getSource, createPost, cleanupOldSignals, setSignalFeedback, clearSignalFeedback, getChannelFeedbackMap, listSources } from '../assets/auth.js';

  const params = new URLSearchParams(location.search);
  const channelId = params.get('id');
  const listEl = document.getElementById('sig-list');
  const fetchBtn = document.getElementById('fetch-now');
  const fetchStatus = document.getElementById('fetch-status');

  // Cache of source label per source_id (lazy populated)
  const sourceCache = new Map();
  async function labelForSource(id){
    if (!id) return null;
    if (sourceCache.has(id)) return sourceCache.get(id);
    try {
      const s = await getSource(id);
      const label = s ? (s.label || s.url) : null;
      sourceCache.set(id, label);
      return label;
    } catch { sourceCache.set(id, null); return null; }
  }

  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // Absolute date display: "May 18, 2026, 3:42 PM".
  function fmtAbsoluteDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    // toLocaleString with these options renders the example format in en-US;
    // in other locales it picks the locale's equivalent of "Month D, YYYY, h:MM AM".
    return d.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit',
    });
  }

  // Compact age display: "45s", "12m ago", "6h 23m ago", "1d 4h ago", "3d ago".
  function fmtAgeCompact(ms) {
    const minutes = Math.max(0, Math.floor(ms / 60000));
    if (minutes < 1)  return 'just now';
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    const rem   = minutes - hours * 60;
    if (hours < 24) return rem ? `${hours}h ${rem}m ago` : `${hours}h ago`;
    const days = Math.floor(hours / 24);
    const hRem = hours - days * 24;
    if (days < 30) return hRem ? `${days}d ${hRem}h ago` : `${days}d ago`;
    const months = Math.floor(days / 30);
    return `${months}mo ago`;
  }

  // Tier for age-color coding. Same thresholds for published-at and the
  // fallback captured-at — the fallback case is distinguished by an italic
  // "added" tag, not by different thresholds.
  function tierForAge(ms) {
    const hours = ms / 3600000;
    if (hours < 6)  return 'fresh';
    if (hours < 12) return 'warm';
    if (hours < 24) return 'stale';
    return 'old';
  }
  function scoreTier(n){
    if (n == null) return 'score-none';
    const v = Number(n);
    if (v >= 70) return 'score-high';
    if (v >= 30) return 'score-mid';
    return 'score-low';
  }

  // Per-channel feedback cache — populated by refresh(); keyed by signal_id.
  let feedbackByRow = {};

  function rowHTML(sig, sourceLabel){
    const score = (sig.score != null) ? String(Math.round(Number(sig.score))) : '—';
    const tier  = scoreTier(sig.score);
    const fb = feedbackByRow[sig.id];
    const goodActive = fb?.verdict === 'good' ? ' is-active' : '';
    const badActive  = fb?.verdict === 'bad'  ? ' is-active' : '';
    const noteTitle  = fb?.note ? `Note: ${fb.note.replace(/"/g, '&quot;')}` : 'Add a note';
    const noteClass  = fb?.note ? ' has-note' : '';
    const showNote   = !!fb;  // note button appears once a verdict is set
    // Pick the reference timestamp: prefer the article's published_at;
    // fall back to captured_at and label honestly. The age pill uses the
    // SAME timestamp — we never label a fetch time as a publish time.
    const refIso     = sig.published_at || sig.captured_at || sig.created_at || null;
    const isFallback = !sig.published_at;
    const dateTxt    = refIso
      ? `${isFallback ? 'Added ' : ''}${fmtAbsoluteDate(refIso)}`
      : '';
    // Compute initial age + tier; the per-minute interval re-derives both
    // from the same data-ts attribute on every tick.
    const ageMs   = refIso ? Math.max(0, Date.now() - new Date(refIso).getTime()) : 0;
    const ageTxt  = refIso ? fmtAgeCompact(ageMs) : '';
    const ageTier = refIso ? tierForAge(ageMs) : 'old';
    const ageHtml = refIso
      ? `<span class="signal-age tier-${ageTier}${isFallback ? ' tier-fallback' : ''}" data-ts="${esc(refIso)}" data-fallback="${isFallback ? '1' : '0'}" title="${esc(isFallback ? 'Added (publish date unknown) ' + fmtAbsoluteDate(refIso) : 'Published ' + fmtAbsoluteDate(refIso))}">${esc(ageTxt)}</span>`
      : '';

    const sourceTxt = sourceLabel || '';
    const sub = [sourceTxt, dateTxt, sig.content ? esc(sig.content).slice(0, 120) : '']
                  .filter(Boolean).join(' · ');
    const hasThumb = !!sig.image_url;
    const thumb = hasThumb
      ? `<div class="signal-thumb" style="background-image:url('${esc(sig.image_url)}')"></div>`
      : '';
    const statusBadge = `<span class="sig-badge ${esc(sig.status || 'new')}">${esc(sig.status || 'new')}</span>`;
    const catChip = sig.category ? `<span class="cat-chip">${esc(sig.category)}</span>` : '';
    return `
      <div class="signal-row ${hasThumb ? 'with-thumb' : ''} tier-${ageTier}" data-id="${sig.id}" data-source="${sig.source_id || ''}" style="cursor:pointer">
        <span class="signal-score ${tier}">${esc(score)}</span>
        <div class="signal-source" style="background:#888">${esc((sourceTxt[0] || '?').toUpperCase())}</div>
        ${thumb}
        <div style="min-width:0">
          <p class="body" style="font-weight:600;margin:0;line-height:1.4">${esc(sig.title)}</p>
          <div class="mt-1" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${statusBadge}
            ${catChip}
            ${ageHtml}
            <span class="tertiary" style="font-size:12px">${esc(sub)}</span>
          </div>
        </div>
        <div class="signal-actions">
          ${sig.raw_url ? '<a href="' + esc(sig.raw_url) + '" target="_blank" rel="noopener" class="btn btn-secondary btn-sm" data-noedit="1">Open</a>' : ''}
          <button class="btn btn-secondary btn-sm" data-action="edit" data-noedit="1">Edit</button>
          <button class="btn btn-primary btn-sm" data-action="create-post" data-noedit="1">Create post</button>
          <button class="signal-action-btn more${goodActive}" data-action="rate-good" data-noedit="1" title="Rate this signal as good (the scorer will favor more like it)" aria-pressed="${goodActive ? 'true' : 'false'}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H7"/></svg>
          </button>
          <button class="signal-action-btn less${badActive}" data-action="rate-bad" data-noedit="1" title="Rate this signal as bad (the scorer will avoid more like it)" aria-pressed="${badActive ? 'true' : 'false'}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H17"/></svg>
          </button>
          ${showNote ? `<button class="signal-action-btn note${noteClass}" data-action="rate-note" data-noedit="1" title="${noteTitle}">📝</button>` : ''}
          <button class="signal-action-btn remove" data-action="delete" data-noedit="1" title="Remove signal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>`;
  }
  function emptyHTML(){
    return `
      <div style="padding:64px 32px;text-align:center">
        <p class="body" style="font-weight:600;font-size:16px;margin:0 0 6px">No signals yet</p>
        <p class="tertiary" style="font-size:13px;margin:0 0 16px;max-width:380px;margin-left:auto;margin-right:auto">Add sources to this channel, then click <b>Fetch now</b> to pull in RSS + website signals.</p>
        <a href="channel-sources.html?id=${encodeURIComponent(channelId)}" class="btn btn-secondary">Manage sources</a>
      </div>`;
  }

  // Filter state
  let allSignals = [];
  let currentCategory = 'All';
  let currentBucket = 'last24';  // 'last24' | '24-48' | '48-72' | 'archived'
  let currentSort = 'lastAdded'; // 'lastAdded' | 'score' | 'source' | 'date'
                                 // Default is captured_at-newest-first so a
                                 // fresh fetch is visible at the top — see
                                 // sortSignalsWithLabels below for semantics.
  const filterEl = document.getElementById('cat-filter');
  const timeTabsEl = document.getElementById('time-tabs');
  const sortByEl = document.getElementById('sort-by');

  const BUCKETS = [
    { key: 'last24',   label: 'Last 24h' },
    { key: '24-48',    label: '24-48h' },
    { key: '48-72',    label: '48-72h' },
    { key: 'archived', label: 'Archived' },
  ];

  // Compute the time bucket a signal falls into from its published_at, with
  // captured_at as a fallback. "Archived" here is age-based (>72h) and is
  // separate from sig.status (which can be 'archived' by user choice).
  function bucketOf(sig){
    const ts = sig.published_at || sig.captured_at || sig.created_at;
    const ms = ts ? new Date(ts).getTime() : NaN;
    if (!Number.isFinite(ms)) return 'archived';  // unknown date → treat as old
    const hours = (Date.now() - ms) / 3600000;
    if (hours < 24) return 'last24';
    if (hours < 48) return '24-48';
    if (hours < 72) return '48-72';
    return 'archived';
  }

  // Category counts within the current TIME bucket.
  // Time counts within the current CATEGORY filter.
  function renderFilters(){
    const bucketedAll = allSignals.filter(s => bucketOf(s) === currentBucket);
    const catFiltered = currentCategory === 'All' ? allSignals : allSignals.filter(s => s.category === currentCategory);

    // Time tabs — count signals in each bucket WITHIN the current category filter
    const bucketCounts = { last24: 0, '24-48': 0, '48-72': 0, archived: 0 };
    for (const s of catFiltered) bucketCounts[bucketOf(s)]++;
    timeTabsEl.style.display = 'flex';
    timeTabsEl.innerHTML = BUCKETS.map(b => {
      const active = b.key === currentBucket ? ' active' : '';
      return `<button class="${active.trim()}" data-bucket="${b.key}">${esc(b.label)}<span class="count">${bucketCounts[b.key]}</span></button>`;
    }).join('');

    // Category filter — count categories WITHIN the current time bucket
    const catCounts = new Map();
    catCounts.set('All', bucketedAll.length);
    for (const s of bucketedAll) {
      if (s.category) catCounts.set(s.category, (catCounts.get(s.category) || 0) + 1);
    }
    if (catCounts.size <= 1) {
      filterEl.style.display = 'none';
      filterEl.innerHTML = '';
    } else {
      filterEl.style.display = 'flex';
      const labels = ['All', ...Array.from(catCounts.keys()).filter(k => k !== 'All').sort((a, b) => catCounts.get(b) - catCounts.get(a))];
      filterEl.innerHTML = labels.map(label => {
        const active = label === currentCategory ? ' active' : '';
        return `<button class="${active.trim()}" data-cat="${esc(label)}">${esc(label)} <span style="opacity:.7;margin-left:4px">${catCounts.get(label)}</span></button>`;
      }).join('');
    }
  }

  filterEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-cat]');
    if (!btn) return;
    currentCategory = btn.dataset.cat;
    renderFilters();
    paintRows();
  });

  timeTabsEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-bucket]');
    if (!btn) return;
    currentBucket = btn.dataset.bucket;
    renderFilters();
    paintRows();
  });

  // Sort dropdown — composes with the active time-bucket and category
  // filters. Default 'score' preserves today's behavior (auth.listSignals
  // already returns rows ordered by published_at then captured_at, and
  // we don't reorder them below for the 'score' branch).
  sortByEl.addEventListener('change', (e) => {
    currentSort = e.target.value || 'lastAdded';
    paintRows();
  });

  // Apply the active sort to the already-filtered set. Returns a new
  // array of { sig, label } so the source label is preserved alongside
  // the signal (we need it for 'source' grouping and for the row HTML).
  function sortSignalsWithLabels(filtered, labels){
    const items = filtered.map((s, i) => ({ sig: s, label: labels[i] || '' }));
    if (currentSort === 'lastAdded') {
      // Sort by captured_at (fetch time), newest first. Deliberately NOT
      // a fallback chain through published_at — this is the "what did I
      // just fetch?" view, so it must reflect fetch time. created_at is
      // the last-resort fallback for very old rows that pre-date the
      // captured_at column.
      items.sort((a, b) => {
        const ta = new Date(a.sig.captured_at || a.sig.created_at || 0).getTime();
        const tb = new Date(b.sig.captured_at || b.sig.created_at || 0).getTime();
        return tb - ta;
      });
    } else if (currentSort === 'date') {
      items.sort((a, b) => {
        const ta = new Date(a.sig.published_at || a.sig.captured_at || 0).getTime();
        const tb = new Date(b.sig.published_at || b.sig.captured_at || 0).getTime();
        return tb - ta;  // newest first
      });
    } else if (currentSort === 'source') {
      // Group by source label (case-insensitive); within a group keep
      // the existing order (which is the API's published_at desc).
      items.sort((a, b) => {
        const la = (a.label || '').toLowerCase();
        const lb = (b.label || '').toLowerCase();
        if (la === lb) return 0;
        if (!la) return 1;   // unlabeled goes last
        if (!lb) return -1;
        return la < lb ? -1 : 1;
      });
    } else if (currentSort === 'score') {
      // Highest score first; null-score (unscored) signals always go to
      // the bottom — an unscored signal shouldn't outrank a scored one.
      items.sort((a, b) => {
        const sa = a.sig.score, sb = b.sig.score;
        const aNull = sa == null, bNull = sb == null;
        if (aNull && bNull) return 0;
        if (aNull) return 1;
        if (bNull) return -1;
        return sb - sa;
      });
    }
    return items;
  }

  function archivedFooter(eligibleCount){
    // Shown only at the bottom of the Archived bucket. Eligible = signals
    // older than 30 days. Cleanup is a manual trigger (no scheduler yet).
    return `
      <div class="cleanup-foot">
        <span>Signals older than 30 days can be cleaned up. Anything turned into a post is kept automatically.</span>
        <button class="btn btn-secondary btn-sm" id="cleanup-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px"><polyline points="3 6 5 6 21 6"/><path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          Clean up signals &gt; 30 days
        </button>
      </div>`;
  }

  async function paintRows(){
    const inBucket = allSignals.filter(s => bucketOf(s) === currentBucket);
    const filtered = currentCategory === 'All' ? inBucket : inBucket.filter(s => s.category === currentCategory);

    let rowsHtml;
    if (!filtered.length) {
      if (!allSignals.length) {
        listEl.innerHTML = emptyHTML();
        return;
      }
      const label = BUCKETS.find(b => b.key === currentBucket)?.label || '';
      rowsHtml = `<div style="padding:32px;text-align:center"><p class="tertiary" style="font-size:13px;margin:0">Nothing in "${esc(label)}"${currentCategory !== 'All' ? ` for category "${esc(currentCategory)}"` : ''}.</p></div>`;
    } else {
      // Resolve source labels up-front so the sort can group by source
      // (and the lookup is cached after this point).
      const labels = await Promise.all(filtered.map(s => labelForSource(s.source_id)));
      const sorted = sortSignalsWithLabels(filtered, labels);
      rowsHtml = sorted.map(it => rowHTML(it.sig, it.label)).join('');
    }

    // Always sweep any previous cleanup footer before re-rendering so we
    // never stack duplicates on repeated paints.
    document.querySelectorAll('.cleanup-foot').forEach(el => el.remove());
    listEl.innerHTML = rowsHtml;

    // Archived bucket adds a single cleanup footer below the list.
    if (currentBucket === 'archived' && allSignals.length) {
      const eligibleCount = allSignals.filter(s => {
        const ts = s.captured_at || s.created_at;
        return ts && (Date.now() - new Date(ts).getTime()) > 30 * 86400000;
      }).length;
      listEl.insertAdjacentHTML('afterend', archivedFooter(eligibleCount));
    }

    // Run one age refresh on freshly-painted rows so the new pills are
    // current as of THIS instant (initial values in rowHTML were computed
    // milliseconds ago; this just ensures consistency before the next
    // minute tick).
    updateAllAges();
    paintChannelHealth();
  }

  // ─── Live age refresh ───────────────────────────────────────────────
  // Every minute, recompute (now - data-ts) for each .signal-age pill on
  // screen and update its text + tier class + row border. RECOMPUTED, not
  // incremented — so a backgrounded tab that throttles the interval still
  // shows the correct age the moment the user looks at it.
  //
  // One shared interval, installed ONCE. paintRows() does not re-install
  // it; new rows are picked up because the interval just queries the DOM.
  function updateAllAges() {
    const now = Date.now();
    for (const pill of document.querySelectorAll('.signal-age[data-ts]')) {
      const ts = new Date(pill.getAttribute('data-ts')).getTime();
      if (!Number.isFinite(ts)) continue;
      const ms = Math.max(0, now - ts);
      const text = fmtAgeCompact(ms);
      if (pill.textContent !== text) pill.textContent = text;
      const tier = tierForAge(ms);
      // Swap the tier class on both the pill and the parent .signal-row,
      // leaving the .tier-fallback marker (italic) untouched.
      const TIERS = ['tier-fresh','tier-warm','tier-stale','tier-old'];
      for (const t of TIERS) pill.classList.remove(t);
      pill.classList.add('tier-' + tier);
      const row = pill.closest('.signal-row');
      if (row) {
        for (const t of TIERS) row.classList.remove(t);
        row.classList.add('tier-' + tier);
      }
    }
  }
  // Single interval, set once. Per-minute is enough — ages change in
  // minute-resolution increments. The same tick also re-renders the
  // channel-level health badges (they use the same compact "X ago"
  // format and need the same recompute-from-source design).
  if (!window.__signalAgeIntervalInstalled) {
    window.__signalAgeIntervalInstalled = true;
    setInterval(() => { updateAllAges(); paintChannelHealth(); }, 60_000);
  }

  // Channel-level health badges in the header — max(last_checked_at)
  // across the channel's sources, and the newest signal timestamp
  // (published_at preferred, else captured_at) across the channel's
  // signals. Two distinct readings on purpose: a quiet but healthy
  // channel reads as "Last checked: 4m ago / Last signal: 2d ago".
  let _channelSources = [];
  async function paintChannelHealth() {
    const host = document.getElementById('channel-health');
    if (!host) return;
    // Newest source check time
    let newestCheck = null;
    for (const s of _channelSources) {
      if (!s.last_checked_at) continue;
      if (!newestCheck || new Date(s.last_checked_at).getTime() > new Date(newestCheck).getTime()) {
        newestCheck = s.last_checked_at;
      }
    }
    // Newest signal time (use the in-memory allSignals)
    let newestSig = null;
    for (const sig of allSignals) {
      const ts = sig.published_at || sig.captured_at || sig.created_at;
      if (!ts) continue;
      if (!newestSig || new Date(ts).getTime() > new Date(newestSig).getTime()) {
        newestSig = ts;
      }
    }
    const checkedAge = newestCheck ? fmtAgeCompact(Math.max(0, Date.now() - new Date(newestCheck).getTime())) : null;
    const signalAge  = newestSig   ? fmtAgeCompact(Math.max(0, Date.now() - new Date(newestSig).getTime()))   : null;
    host.innerHTML =
      `<span class="src-health" title="${newestCheck ? esc('Newest fetch across this channel’s sources at ' + new Date(newestCheck).toLocaleString()) : 'No source has been fetched yet.'}"><span class="src-health-label">Last checked</span><span class="src-health-val ${checkedAge ? '' : 'muted'}">${esc(checkedAge || 'never')}</span></span>` +
      `<span class="src-health" title="${newestSig ? esc('Newest signal in this channel at ' + new Date(newestSig).toLocaleString()) : 'No signals captured yet for this channel.'}"><span class="src-health-label">Last signal</span><span class="src-health-val ${signalAge ? '' : 'muted'}">${esc(signalAge || 'none yet')}</span></span>`;
  }

  async function refresh(){
    if (!channelId) return;
    try {
      const [sigs, fbMap, sources] = await Promise.all([
        listSignals(channelId),
        getChannelFeedbackMap(channelId),
        listSources(channelId),
      ]);
      // Hide signals that have already been turned into a published
      // post — their .status flips to 'used' inside the post-editor on
      // a successful publish. The signal row stays in the DB and the
      // post.signal_id link is preserved; we just exclude them from the
      // active list here so the Signal Room shows only fresh material.
      // Filtering at the boundary keeps every downstream consumer
      // (time-bucket counts, sort, category filter, channel-health
      // freshest-signal) consistent without per-call filters.
      allSignals = (sigs || []).filter(s => s.status !== 'used');
      feedbackByRow = fbMap;
      _channelSources = sources;
    } catch (e) {
      listEl.innerHTML = `<div style="padding:24px;text-align:center"><p class="tertiary">${esc(e?.message || 'Failed to load.')}</p></div>`;
      return;
    }
    // If the selected category filter is no longer present, fall back to All
    const presentCategories = new Set(allSignals.map(s => s.category).filter(Boolean));
    if (currentCategory !== 'All' && !presentCategories.has(currentCategory)) currentCategory = 'All';
    renderFilters();
    await paintRows();
    paintChannelHealth();
  }

  // Row clicks → Edit modal (body), or explicit per-action buttons.
  listEl.addEventListener('click', async (e) => {
    const actionBtn = e.target.closest('button[data-action]');
    const row = e.target.closest('.signal-row');
    if (!row) return;
    const signalId = row.dataset.id;

    if (actionBtn?.dataset.action === 'create-post') {
      e.preventDefault();
      actionBtn.disabled = true;
      const orig = actionBtn.textContent;
      actionBtn.textContent = 'Creating…';
      try {
        const all = await listSignals(channelId);
        const sig = all.find(s => s.id === signalId);
        if (!sig) throw new Error('Signal not found.');
        const post = await createPost({
          channelId,
          signalId: sig.id,
          title: sig.title,
          content: sig.content,
          imageUrl: sig.image_url,
          sourceUrl: sig.raw_url,
        });
        window.location.href = `post-editor.html?id=${encodeURIComponent(channelId)}&post=${encodeURIComponent(post.id)}`;
      } catch (err) {
        alert(err?.message || 'Could not create post.');
        actionBtn.disabled = false;
        actionBtn.textContent = orig;
      }
      return;
    }

    if (actionBtn?.dataset.action === 'edit') {
      e.preventDefault();
      openEdit(signalId);
      return;
    }

    if (actionBtn?.dataset.action === 'rate-good' || actionBtn?.dataset.action === 'rate-bad') {
      e.preventDefault();
      const verdict = actionBtn.dataset.action === 'rate-good' ? 'good' : 'bad';
      const existing = feedbackByRow[signalId];
      actionBtn.disabled = true;
      try {
        if (existing && existing.verdict === verdict) {
          // Clicking the same verdict again clears it (toggle off).
          await clearSignalFeedback(signalId);
          delete feedbackByRow[signalId];
        } else {
          const fb = await setSignalFeedback({
            signalId, channelId, verdict,
            note: existing?.note ?? null,  // preserve note on flip
          });
          feedbackByRow[signalId] = fb;
        }
        // Repaint just this row's actions in place to keep scroll position.
        const labels = await Promise.all([labelForSource(row.dataset.source)]);
        const sig = allSignals.find(s => s.id === signalId);
        if (sig) row.outerHTML = rowHTML(sig, labels[0]);
      } catch (err) {
        alert(err?.message || 'Could not save feedback.');
      } finally {
        actionBtn.disabled = false;
      }
      return;
    }

    if (actionBtn?.dataset.action === 'rate-note') {
      e.preventDefault();
      const existing = feedbackByRow[signalId];
      if (!existing) return;  // safety — note button only appears with a verdict set
      const next = prompt('Add a note about why this signal is ' + existing.verdict + ' (optional):', existing.note || '');
      if (next === null) return;  // cancelled
      try {
        const fb = await setSignalFeedback({
          signalId, channelId, verdict: existing.verdict,
          note: next.trim() || null,
        });
        feedbackByRow[signalId] = fb;
        const labels = await Promise.all([labelForSource(row.dataset.source)]);
        const sig = allSignals.find(s => s.id === signalId);
        if (sig) row.outerHTML = rowHTML(sig, labels[0]);
      } catch (err) {
        alert(err?.message || 'Could not save note.');
      }
      return;
    }

    if (actionBtn?.dataset.action === 'delete') {
      e.preventDefault();
      if (!confirm('Remove this signal?')) return;
      actionBtn.disabled = true;
      try {
        await deleteSignal(signalId);
        await refresh();
      } catch (err) {
        alert(err?.message || 'Could not remove signal.');
        actionBtn.disabled = false;
      }
      return;
    }

    // Fallback: clicking body opens Edit (unchanged behaviour)
    if (!e.target.closest('[data-noedit="1"]')) openEdit(signalId);
  });

  // Cleanup-foot button is rendered after the list (sibling of listEl), so
  // it needs its own listener on the parent.
  listEl.parentElement.addEventListener('click', async (e) => {
    const btn = e.target.closest('#cleanup-btn');
    if (!btn) return;
    if (!confirm('Delete signals older than 30 days that have NOT been turned into posts?')) return;
    btn.disabled = true;
    const orig = btn.innerHTML;
    btn.textContent = 'Cleaning up…';
    try {
      const res = await cleanupOldSignals(channelId, 30);
      alert(`Cleanup complete:
• ${res.deleted} signal(s) deleted
• ${res.kept_referenced} kept because they were turned into posts
• ${res.candidates} eligible (>30 days)`);
      await refresh();
    } catch (err) {
      alert(err?.message || 'Cleanup failed.');
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  });

  // ─── Fetch now ──────────────────────────────────────────────────────────────
  fetchBtn.addEventListener('click', async () => {
    fetchStatus.style.display = 'inline';
    fetchStatus.style.color = '';
    fetchStatus.textContent = 'Fetching…';
    fetchBtn.disabled = true;
    const original = fetchBtn.innerHTML;
    fetchBtn.textContent = 'Fetching…';
    try {
      const summary = await fetchSignalsNow(channelId);
      const n = summary.inserted | 0;
      let msg;
      if (n > 0) {
        msg = `Added ${n} new signal${n === 1 ? '' : 's'}`;
      } else {
        msg = 'No new signals this time — check back later, or add more sources.';
      }
      // Surface errors quietly without bringing back the "dup/err" jargon —
      // a small parenthetical with red text is enough; full details still
      // live in the network response.
      if (summary.errors?.length) {
        const e = summary.errors.length;
        msg += ` (${e} source${e === 1 ? '' : 's'} had errors)`;
        fetchStatus.style.color = '#b91c1c';
      }
      fetchStatus.textContent = msg;
      await refresh();
    } catch (e) {
      fetchStatus.textContent = e?.message || 'Fetch failed';
      fetchStatus.style.color = '#b91c1c';
    } finally {
      fetchBtn.disabled = false;
      fetchBtn.innerHTML = original;
    }
  });

  // ─── Score signals ──────────────────────────────────────────────────────────
  const scoreBtn = document.getElementById('score-now');
  const scoreStatus = document.getElementById('score-status');
  scoreBtn.addEventListener('click', async () => {
    scoreStatus.style.display = 'inline';
    scoreStatus.style.color = '';
    scoreStatus.textContent = 'Scoring…';
    scoreBtn.disabled = true;
    const original = scoreBtn.innerHTML;
    scoreBtn.textContent = 'Scoring…';
    try {
      const summary = await scoreSignalsNow(channelId);
      if ((summary.requested ?? 0) === 0) {
        scoreStatus.textContent = 'Nothing to score.';
      } else {
        let msg = `Scored ${summary.scored}/${summary.requested}`;
        if (summary.errors?.length) msg += ` · ${summary.errors.length} err`;
        scoreStatus.textContent = msg;
        if (summary.errors?.length) scoreStatus.style.color = '#b91c1c';
      }
      await refresh();
    } catch (e) {
      scoreStatus.textContent = e?.message || 'Score failed';
      scoreStatus.style.color = '#b91c1c';
    } finally {
      scoreBtn.disabled = false;
      scoreBtn.innerHTML = original;
    }
  });

  // ─── Edit signal modal ──────────────────────────────────────────────────────
  const esOverlay = document.getElementById('es-overlay');
  const esSourceLine = document.getElementById('es-source-line');
  const esTitle = document.getElementById('es-title');
  const esContent = document.getElementById('es-content');
  const esStatus = document.getElementById('es-status');
  const esErr = document.getElementById('es-error');
  const esSave = document.getElementById('es-save');
  const esCancel = document.getElementById('es-cancel');
  const esDelete = document.getElementById('es-delete');
  let editingSignalId = null;

  function closeEdit(){ esOverlay.classList.remove('open'); editingSignalId = null; }
  esCancel.addEventListener('click', closeEdit);
  esOverlay.addEventListener('click', (e) => { if (e.target === esOverlay) closeEdit(); });

  async function openEdit(signalId){
    editingSignalId = signalId;
    esErr.style.display = 'none';
    // Load current values from the DOM (fast) — they came from listSignals
    const row = listEl.querySelector(`.signal-row[data-id="${signalId}"]`);
    const sourceId = row?.dataset.source || '';
    const label = sourceId ? (sourceCache.get(sourceId) || '') : '';
    esSourceLine.textContent = label ? ('From ' + label) : '';

    // Fetch the full row to be sure (especially full content)
    const all = await listSignals(channelId);
    const sig = all.find(x => x.id === signalId);
    if (!sig) { esErr.textContent = 'Signal not found.'; esErr.style.display = 'block'; return; }
    esTitle.value = sig.title || '';
    esContent.value = sig.content || '';
    esStatus.value = sig.status || 'new';

    // ── Meta strip: image + dates + category + URL ────────────────────
    const imageRow = document.getElementById('es-image-row');
    const noImgRow = document.getElementById('es-meta-noimg');
    const imgEl    = document.getElementById('es-image');
    // Dual hosts so the meta is visible whether or not there's a thumb
    const metaDatesEls     = [document.getElementById('es-meta-dates'),     document.getElementById('es-meta-dates-noimg')];
    const metaCategoryEls  = [document.getElementById('es-meta-category'),  document.getElementById('es-meta-category-noimg')];
    const metaUrlEls       = [document.getElementById('es-meta-url'),       document.getElementById('es-meta-url-noimg')];

    if (sig.image_url) {
      imageRow.style.display = 'flex';
      noImgRow.style.display = 'none';
      imgEl.style.backgroundImage = `url('${sig.image_url.replace(/'/g, "%27")}')`;
    } else {
      imageRow.style.display = 'none';
      noImgRow.style.display = 'block';
    }

    // Dates: "Published <abs> · captured <abs>" or "Added <abs>" when no publish
    const pubAbs = sig.published_at ? fmtAbsoluteDate(sig.published_at) : null;
    const capAbs = (sig.captured_at || sig.created_at) ? fmtAbsoluteDate(sig.captured_at || sig.created_at) : null;
    let datesText = '';
    if (pubAbs && capAbs) {
      datesText = `Published ${pubAbs}  ·  Captured ${capAbs}`;
    } else if (capAbs) {
      datesText = `Added ${capAbs}  ·  no publish date in source`;
    }
    metaDatesEls.forEach(el => { if (el) el.textContent = datesText; });

    // Category chip
    metaCategoryEls.forEach(el => {
      if (!el) return;
      if (sig.category) { el.textContent = sig.category; el.style.display = 'inline-flex'; }
      else el.style.display = 'none';
    });

    // Article URL
    metaUrlEls.forEach(el => {
      if (!el) return;
      if (sig.raw_url) {
        el.href = sig.raw_url;
        el.style.display = 'inline';
        try { el.textContent = new URL(sig.raw_url).host.replace(/^www\./, '') + ' ↗'; }
        catch { el.textContent = 'Open article ↗'; }
      } else el.style.display = 'none';
    });

    esOverlay.classList.add('open');
  }

  esSave.addEventListener('click', async () => {
    if (!editingSignalId) return;
    esErr.style.display = 'none';
    esSave.disabled = true;
    const orig = esSave.textContent;
    esSave.textContent = 'Saving…';
    try {
      await updateSignal(editingSignalId, {
        title: esTitle.value.trim() || 'Untitled',
        content: esContent.value.trim() || null,
        status: esStatus.value,
      });
      closeEdit();
      await refresh();
    } catch (e) {
      esErr.textContent = e?.message || 'Save failed.';
      esErr.style.display = 'block';
    } finally {
      esSave.disabled = false;
      esSave.textContent = orig;
    }
  });

  esDelete.addEventListener('click', async () => {
    if (!editingSignalId) return;
    if (!confirm('Delete this signal?')) return;
    esErr.style.display = 'none';
    esDelete.disabled = true;
    try {
      await deleteSignal(editingSignalId);
      closeEdit();
      await refresh();
    } catch (e) {
      esErr.textContent = e?.message || 'Delete failed.';
      esErr.style.display = 'block';
    } finally {
      esDelete.disabled = false;
    }
  });

  // ─── Add from URL card ──────────────────────────────────────────────────────
  const adhocUrlInp = document.getElementById('adhoc-url');
  const adhocBtn = document.getElementById('adhoc-fetch');
  const adhocStatus = document.getElementById('adhoc-status');
  async function submitAdhoc(){
    const url = adhocUrlInp.value.trim();
    adhocStatus.style.display = 'inline';
    adhocStatus.style.color = '';
    if (!url) { adhocStatus.textContent = 'Enter a URL.'; adhocStatus.style.color = '#b91c1c'; return; }
    try { new URL(url); }
    catch { adhocStatus.textContent = 'That doesn’t look like a URL.'; adhocStatus.style.color = '#b91c1c'; return; }
    adhocBtn.disabled = true;
    const orig = adhocBtn.innerHTML;
    adhocBtn.textContent = 'Fetching…';
    adhocStatus.textContent = 'Fetching…';
    try {
      const res = await fetchSignalFromUrl(channelId, url, 'website');
      if (res.inserted > 0) {
        adhocStatus.textContent = `Added "${res.signal?.title?.slice(0, 60) || 'signal'}".`;
        adhocUrlInp.value = '';
      } else {
        adhocStatus.textContent = res.message || 'Already captured for this channel.';
      }
      await refresh();
    } catch (e) {
      adhocStatus.textContent = e?.message || 'Fetch failed.';
      adhocStatus.style.color = '#b91c1c';
    } finally {
      adhocBtn.disabled = false;
      adhocBtn.innerHTML = orig;
    }
  }
  adhocBtn.addEventListener('click', submitAdhoc);
  adhocUrlInp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submitAdhoc(); } });

  refresh();
</script>
</body>
</html>
