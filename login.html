<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>Sign in — AnyNews.ai</title><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="shared.css"/><style></style></head><body><div class="aura"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div><div class="shell">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo"><a href="index" class="logo"><span class="logo-mark"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#5B21B6"/><stop offset="0.5" stop-color="#7C3AED"/><stop offset="1" stop-color="#C026D3"/></linearGradient></defs><rect width="28" height="28" rx="8" fill="url(#lg)"/><path d="M7 20 L14 8 L21 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="14" cy="17" r="2" fill="#fff"/><path d="M8.5 14.5 L14 14.5 M14 14.5 L19.5 14.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg></span>AnyNews<span class="ai">.ai</span></a></div>
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to your newsroom.</p>
      <div class="af-row"><label>Email</label><input type="email" id="loginEmail" placeholder="you@company.com" autocomplete="email"/></div>
      <div class="af-row"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/></div>
      <div style="text-align:right;margin:-10px 0 18px;"><a href="forgot-password" style="font-size:12px;color:var(--v2);font-weight:600;">Forgot password?</a></div>
      <div id="loginError" class="af-hint" style="display:none;color:#b91c1c;margin-bottom:10px;"></div>
      <button class="auth-btn" id="loginBtn">Sign in →</button>
      <div class="auth-divider"><span>or continue with</span></div>
      <div class="auth-social">
        <a href="#"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</a>
        <a href="#"><svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12a12 12 0 1 0-13.88 11.85v-8.38H7.08V12h3.04V9.41c0-3 1.79-4.66 4.53-4.66 1.31 0 2.69.24 2.69.24v2.95h-1.52c-1.49 0-1.95.93-1.95 1.87V12h3.33l-.53 3.47h-2.8v8.38A12 12 0 0 0 24 12z"/></svg>Facebook</a>
      </div>
      <p class="auth-foot">Don't have an account? <a href="signup">Sign up free</a></p>
    </div>
  </div>
</div>
<script type="module">
  import { signIn } from './assets/auth.js';
  const btn = document.getElementById('loginBtn');
  const emailEl = document.getElementById('loginEmail');
  const pwEl = document.getElementById('loginPassword');
  const errEl = document.getElementById('loginError');
  function showError(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }
  function clearError(){ errEl.textContent = ''; errEl.style.display = 'none'; }
  async function submit(){
    clearError();
    const email = emailEl.value.trim();
    const password = pwEl.value;
    if (!email || !password) { showError('Enter your email and password.'); return; }
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'Signing in…';
    try {
      await signIn({ email, password });
      window.location.href = 'app/dashboard';
    } catch (e) {
      showError(e?.message || 'Sign in failed.');
      btn.disabled = false;
      btn.textContent = original;
    }
  }
  btn.addEventListener('click', submit);
  [emailEl, pwEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
</script>
</body></html>
