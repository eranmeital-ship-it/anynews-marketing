<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>New password — AnyNews.ai</title><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="shared.css"/><style></style></head><body><div class="aura"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div><div class="shell">
  <div class="auth-shell">
    <div class="auth-card" id="resetCard">
      <div class="auth-logo"><a href="index" class="logo"><span class="logo-mark"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#5B21B6"/><stop offset="0.5" stop-color="#7C3AED"/><stop offset="1" stop-color="#C026D3"/></linearGradient></defs><rect width="28" height="28" rx="8" fill="url(#lg)"/><path d="M7 20 L14 8 L21 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="14" cy="17" r="2" fill="#fff"/><path d="M8.5 14.5 L14 14.5 M14 14.5 L19.5 14.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg></span>AnyNews<span class="ai">.ai</span></a></div>
      <h1>Set new password</h1>
      <p class="auth-sub">Choose a strong password for your account.</p>
      <div class="af-row"><label>New password</label><input type="password" id="resetPw1" placeholder="Min. 8 characters" autocomplete="new-password"/></div>
      <div class="af-row"><label>Confirm password</label><input type="password" id="resetPw2" placeholder="Type it again" autocomplete="new-password"/></div>
      <div id="resetError" class="af-hint" style="display:none;color:#b91c1c;margin-bottom:10px;"></div>
      <button class="auth-btn" id="resetBtn">Update password →</button>
    </div>
  </div>
</div>
<script type="module">
  import { supabase, updatePassword } from './assets/auth.js';
  const card = document.getElementById('resetCard');
  const btn = document.getElementById('resetBtn');
  const pw1 = document.getElementById('resetPw1');
  const pw2 = document.getElementById('resetPw2');
  const errEl = document.getElementById('resetError');
  function showError(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }

  // The client auto-detects the recovery token in the URL hash via
  // detectSessionInUrl: true. Wait briefly for that to settle so updateUser
  // has a session to act on.
  let recoveryReady = false;
  supabase.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') recoveryReady = true;
  });

  async function submit(){
    errEl.style.display = 'none';
    const a = pw1.value, b = pw2.value;
    if (a.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (a !== b) { showError('Passwords do not match.'); return; }

    if (!recoveryReady) {
      const { data } = await supabase.auth.getSession();
      if (!data?.session) { showError('Reset link is invalid or has expired. Request a new one.'); return; }
    }

    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'Updating…';
    try {
      await updatePassword(a);
      await supabase.auth.signOut(); // force a fresh sign-in with the new password
      card.innerHTML = '<div class="auth-success"><div class="check-circle"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><h1>Password updated</h1><p class="auth-sub">Sign in with your new password.</p><a href="login" class="auth-btn" style="text-align:center;display:block;text-decoration:none">Back to sign in</a></div>';
    } catch (e) {
      showError(e?.message || 'Could not update password.');
      btn.disabled = false;
      btn.textContent = original;
    }
  }
  btn.addEventListener('click', submit);
  [pw1, pw2].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
</script>
</body></html>
