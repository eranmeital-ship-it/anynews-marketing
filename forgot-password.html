<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>Reset password — AnyNews.ai</title><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="shared.css"/><style></style></head><body><div class="aura"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div><div class="shell">
  <div class="auth-shell">
    <div class="auth-card" id="forgotCard">
      <div class="auth-logo"><a href="index" class="logo"><span class="logo-mark"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#5B21B6"/><stop offset="0.5" stop-color="#7C3AED"/><stop offset="1" stop-color="#C026D3"/></linearGradient></defs><rect width="28" height="28" rx="8" fill="url(#lg)"/><path d="M7 20 L14 8 L21 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="14" cy="17" r="2" fill="#fff"/><path d="M8.5 14.5 L14 14.5 M14 14.5 L19.5 14.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg></span>AnyNews<span class="ai">.ai</span></a></div>
      <h1>Reset password</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
      <div class="af-row"><label>Email</label><input type="email" id="forgotEmail" placeholder="you@company.com" autocomplete="email"/></div>
      <div id="forgotError" class="af-hint" style="display:none;color:#b91c1c;margin-bottom:10px;"></div>
      <button class="auth-btn" id="forgotBtn">Send reset link →</button>
      <p class="auth-foot">Remember your password? <a href="login">Sign in</a></p>
    </div>
  </div>
</div>
<script type="module">
  import { requestPasswordReset } from './assets/auth.js';
  const card = document.getElementById('forgotCard');
  const btn = document.getElementById('forgotBtn');
  const emailEl = document.getElementById('forgotEmail');
  const errEl = document.getElementById('forgotError');
  function showError(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }
  async function submit(){
    errEl.style.display = 'none';
    const email = emailEl.value.trim();
    if (!email) { showError('Enter your email.'); return; }
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'Sending…';
    try {
      const redirectTo = window.location.origin + '/reset-password';
      await requestPasswordReset(email, redirectTo);
      card.innerHTML = '<div class="auth-success"><div class="check-circle"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><h1>Check your inbox</h1><p class="auth-sub">We sent a password reset link to your email. It expires in 1 hour.</p><a href="login" class="auth-btn" style="text-align:center;display:block;text-decoration:none">Back to sign in</a></div>';
    } catch (e) {
      showError(e?.message || 'Could not send reset email.');
      btn.disabled = false;
      btn.textContent = original;
    }
  }
  btn.addEventListener('click', submit);
  emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body></html>
