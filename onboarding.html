<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<style id="ag-hide">html{visibility:hidden}</style>
<script type="module" src="assets/onboarding-guard.js"></script>
<title>Welcome — AnyNews.ai</title><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="shared.css"/><style></style></head><body><div class="aura"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div><div class="shell">
  <div class="ob-shell">
    <div class="ob-card">
      <div class="ob-step active">
        <h2>Welcome to <span class="g">AnyNews.ai</span></h2>
        <p class="ob-sub">Your account is ready. Next, let's create your first news channel — that's where you pick your sources, connect socials, set your brand voice, and choose how to publish.</p>
        <div id="onbError" class="af-hint" style="display:none;color:#b91c1c;margin-bottom:14px;"></div>
        <div class="ob-nav"><button class="ob-next" id="onbContinue">Create your first channel →</button></div>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { completeOnboarding } from './assets/auth.js';
  const btn = document.getElementById('onbContinue');
  const errEl = document.getElementById('onbError');
  function showError(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }
  btn.addEventListener('click', async () => {
    errEl.style.display = 'none';
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'One moment…';
    try {
      await completeOnboarding();
      window.location.href = 'app/new-channel';
    } catch (e) {
      showError(e?.message || 'Could not continue. Please try again.');
      btn.disabled = false;
      btn.textContent = original;
    }
  });
</script>
</body></html>
